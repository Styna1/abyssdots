windowrule {
  name = windowrule-1
  float = on
  center = on
  size = (monitor_w*0.7)
  match:class = ^(Alacritty)$
  match:title = ^(Config Editor)$
}

windowrule {
  name = windowrule-2
  float = on
  center = on
  size = (monitor_w*0.7)
  match:class = ^(Alacritty)$
  match:title = ^(SSH Manager)$
}


windowrule {
  name = windowrule-3
  float = on
  center = on
  size = (monitor_w*0.65)
  match:class = waypaper
}

